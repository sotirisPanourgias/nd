<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basketball Squad</title>
  <style>
    :root {
      --bg: radial-gradient(circle at top, #f8b73d, #c75618 70%);
      --card: rgba(255, 255, 255, 0.9);
      --primary: #d35400;
      --primary-dark: #a84300;
      --text: #1a1a1a;
      --shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: 2.1rem;
      letter-spacing: 0.04em;
      text-align: center;
    }

    h2 {
      font-size: 1.25rem;
      margin: 0 0 0.5rem;
    }

    section {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 1.25rem 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
    }

    input,
    button {
      padding: 0.65rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.12);
      font-size: 1rem;
      outline: none;
    }

    input {
      width: 100%;
      max-width: 280px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      background: var(--primary);
      color: white;
      border: 1px solid rgba(0, 0, 0, 0.18);
      transition: transform 160ms ease, box-shadow 160ms ease;
      margin-right: 0.35rem;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.18);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    hr {
      border: none;
      height: 1px;
      background: rgba(0, 0, 0, 0.1);
      margin: 1.25rem 0;
    }

    #players {
      display: grid;
      gap: 0.75rem;
    }

    .player {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-name {
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .player-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(243, 156, 18, 0.25);
      border-radius: 999px;
      padding: 0.25rem 0.55rem;
      font-size: 0.9rem;
    }

    .badge-impostor {
      background: rgba(231, 76, 60, 0.18);
    }

    .badge-crewmate {
      background: rgba(46, 204, 113, 0.18);
    }

    .small-text {
      font-size: 0.85rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main>
    <h1>🏀 Basketball Squad</h1>

    <section>
      <h2>Setup players</h2>
      <label>
        Number of players<br />
        <input id="numPlayers" type="number" min="2" value="3" />
      </label>
      <div id="playerInputs" style="margin-top: 0.75rem;"></div>
      <br />
      <button id="setupPlayers">Setup</button>
    </section>

    <section>
      <h2>Create player</h2>
      <label>
        Name<br />
        <input id="name" placeholder="Alice" />
      </label>
      <br />
      <button id="create">Create</button>
    </section>

    <section>
      <h2 id="gameTitle">Game</h2>
      <label>
        Your user ID (<span id="userIdRange">1–3</span>)<br />
        <input id="userId" type="number" min="1" value="1" />
      </label>
      <br />
      <button id="loadRole">Load role</button>
      <button id="newRound">New round</button>
      <button id="endGame">End game</button>
      <p id="role" class="small-text"></p>
    </section>

    <section>
      <h2>Players</h2>
      <div id="players"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
