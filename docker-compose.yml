services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: impostor
      POSTGRES_USER: impostor_user
      POSTGRES_PASSWORD: impostor_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./games/impostor/db/scripts/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
      - ./games/impostor/db/scripts/002_seed_euroleague.sql:/docker-entrypoint-initdb.d/002_seed_euroleague.sql
      - ./games/impostor/db/scripts/003_seed_nba.sql:/docker-entrypoint-initdb.d/003_seed_nba.sql
      - ./games/impostor/db/scripts/004_seed_euroleague_coaches.sql:/docker-entrypoint-initdb.d/004_seed_euroleague_coaches.sql
      - ./games/impostor/db/scripts/005_seed_nba_coaches.sql:/docker-entrypoint-initdb.d/005_seed_nba_coaches.sql
      - ./games/impostor/db/scripts/006_seed_nba_legends.sql:/docker-entrypoint-initdb.d/006_seed_nba_legends.sql
      - ./games/impostor/db/scripts/007_seed_euroleague_legends.sql:/docker-entrypoint-initdb.d/007_seed_euroleague_legends.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impostor_user -d impostor"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USER: impostor_user
      DB_PASSWORD: impostor_pass
      DB_NAME: impostor
      DB_PORT: 5432
      PORT: 8081
    volumes:
      - ./games/impostor/frontend/public:/app/games/impostor/frontend/public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
